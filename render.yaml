services:
  - type: web
    name: vaani-1092
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_PATH
        value: /var/data/vaani.db
    disk:
      name: vaani-db
      mountPath: /var/data
      sizeGB: 1
